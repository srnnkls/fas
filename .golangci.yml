version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - nilerr
    - perfsprint
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
    - wastedassign

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
        - experimental
      disabled-checks:
        - hugeParam
        - paramTypeCombine
        - whyNoLint

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: early-return
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
          disabled: true
        - name: var-declaration
        - name: var-naming

    staticcheck:
      checks:
        - all

    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocritic
          - revive
          - unparam

      # Internal packages and binary entrypoints don't need package doc comments
      # or exported-symbol doc comments (not user-facing API).
      - path: (^internal/|^cmd/)
        linters:
          - staticcheck
        text: "ST1000:"
      - path: (^internal/|^cmd/)
        linters:
          - revive
        text: "(package-comments|exported):"
