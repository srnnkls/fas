---
scope: diag-errors
---

batch_reviews:
  - batch: 1
    tasks: [T1, T2]
    commit: pending
    reviewers:
      - id: general-claude
        status: completed
        outcome: approved
        gates: { correctness: pass, security: pass, performance: pass }
        issues: { critical: 0, high: 0, medium: 0, low: 4 }
      - id: architecture-claude
        status: completed
        outcome: approved
        gates: { architecture: pass }
        issues: { critical: 0, high: 0, medium: 0, low: 2 }
      - id: compliance-claude
        status: completed
        outcome: changes_requested
        gates: { style: fail }
        issues: { critical: 0, high: 1, medium: 3, low: 2 }
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass  # after fix
      critical_issues: 0
      high_issues: 1   # resolved
      medium_issues: 3 # resolved
      low_issues: 8    # deferred
    outcome: approved_after_fix
    fix:
      - resolved: [H1 gofmt, M1-M3 godoc on public API]
      - deferred: [4 × low render polish, 2 × low test helpers]

  - batch: 2
    tasks: [T3]
    commit: pending
    reviewers:
      - id: general-claude
        status: completed
        outcome: approved
        gates: { correctness: pass, security: pass, performance: pass }
        issues: { critical: 0, high: 0, medium: 0, low: 0 }
      - id: architecture-claude
        status: completed
        outcome: approved
        gates: { architecture: pass }
        issues: { critical: 0, high: 0, medium: 0, low: 2 }
      - id: compliance-claude
        status: completed
        outcome: approved
        gates: { style: pass }
        issues: { critical: 0, high: 0, medium: 0, low: 3 }
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 0
      low_issues: 5
    outcome: approved
    key_finding: |
      cue.Value.Syntax() does NOT preserve positions (pretty-prints).
      cue.Value.Source() on pre-Unify value is the correct idiom.
      design.md updated; T4/T5/T6 descriptors reference the new pattern.

  - batch: 3
    tasks: [T4, T5]
    commit: pending
    reviewers:
      - id: consolidated-claude
        status: completed
        outcome: approved
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 0, medium: 0, low: 4 }
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 0
      low_issues: 4
    outcome: approved
    notes: |
      Consolidated single-reviewer pass (context budget). FromCueError
      distinguishes E0101 (schema shape) / E0102 (unknown action kind) via
      path-shape + message-shape. DiagError.Unwrap preserves CUE error chain
      so existing errors.As(err, &cueErr) callers continue to work.
      E0503 help wording flipped to match lint direction.

  - batch: 6
    tasks: [T8, T9]
    commit: pending
    reviewers:
      - id: test-reviewer-claude-T8
        status: completed
        phase: A.5
        outcome: changes_requested
        gates: { test_quality: fail }
        issues: { critical: 1, high: 2, medium: 3, low: 2 }
        fix:
          - resolved: [C1 actual unset via os.Unsetenv+Cleanup, H1 equivalence order swap, H2 flag=missed mirror, M1 parent Setenv guard, M2 "fired"/"missed"/"both" as non-truthy, M3 env reset between runs, L1 globalDir normalize, L2 drop lookupEnv wrapper]
      - id: test-reviewer-claude-T9
        status: completed
        phase: A.5
        outcome: changes_requested
        gates: { test_quality: fail }
        issues: { critical: 0, high: 2, medium: 3, low: 2 }
        fix:
          - resolved: [H1 E0201 count==1, H2 NoRuleIDArg positive+negative asserts, M1 MissingRuleID no E-code, M2 both-dirs-populated cross-resolution, M3 toggle-leak positive control, L1 delete unused fixtures, L2 stdout-contract anchor comment]
      - id: code-reviewer-claude-T8
        status: completed
        phase: C
        outcome: approved_after_fix
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 0, medium: 1, low: 1 }
        fix:
          - resolved: [M1 writeUsage documents FAS_EXPLAIN in a new Environment block]
          - deferred: [L1 isTruthyEnv style uniformity]
      - id: code-reviewer-claude-T9
        status: completed
        phase: C
        outcome: approved_after_fix
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 0, medium: 2, low: 3 }
        fix:
          - resolved: [M2 errors.Is(err, ErrInvalidInput) before generic err path, L3 writeUsage documents positional-first rule_id + implicit --explain=missed + stdin required]
          - deferred: [M1 flag-before-positional form (documented constraint, low-risk), L1 flag duplication between runExplain and parseFlags, L2 findRuleByID variadic vs positional]
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 4
      low_issues: 5
    outcome: approved_after_fix
    notes: |
      T8+T9 executed in parallel with the user's explicit preference to
      disregard same-file merge concerns. Four distinct Phase A.5 + Phase C
      subagents ran with no conflicts because each scoped its edits
      narrowly: T8 touched cliOptions area + isTruthyEnv; T9 touched the
      top-of-run dispatch + new runExplain/findRuleByID. Post-review fixes
      were applied directly to main.go (writeUsage FAS_EXPLAIN
      Environment block + positional-first & implicit-explain guidance;
      ErrInvalidInput sentinel check in runExplain) rather than spawning
      another loop. All 24 combined T8+T9 tests pass; full suite green.

  - batch: 5
    tasks: [T7]
    commit: pending
    reviewers:
      - id: test-reviewer-claude
        status: completed
        phase: A.5
        outcome: changes_requested
        gates: { test_quality: fail }
        issues: { critical: 0, high: 3, medium: 3, low: 2 }
        fix:
          - resolved: [H1 bare vs explicit --explain equivalence, H2 three-rule exact-count test, H3 toggle-reset in-process documentation, M1 position-anchor within file line range, M2 fired+blocking exit-code test, M3 ordering comment, L1 exit!=0 relaxation, L2 E0201 count==1]
      - id: code-reviewer-claude
        status: completed
        phase: C
        outcome: approved_after_fix
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 1, medium: 3, low: 3 }
        fix:
          - resolved: [H1 export config.RulesModuleRoot and drop rulesVirtualRoot duplicate, M3 ruleIDForDiag prefers full-path over basename]
          - deferred: [M1 rule_id as Diagnostic Note inside localize, M2 fired trace via diag.Render, L1 explainOff unused, L2 renderExplain variadic arity, L3 token.Pos.Filename spelling smoke test]
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 2
      low_issues: 3
    outcome: approved_after_fix
    notes: |
      Phase A.5 test review caught 3 tautology/weak-assertion issues (bare
      --explain vs explicit =missed equivalence, missing exact-count
      assertion against scope F7 acceptance, in-process toggle-leak
      contract). Tester back-filled before GREEN. Phase C review flagged
      one drift risk: rulesVirtualRoot in main.go duplicated unexported
      config.rulesModuleRoot — resolved by exporting config.RulesModuleRoot
      (single source of truth, compile-time break on drift). M3
      ruleIDForDiag now prefers full-path match to handle
      global+project same-basename collisions. M1 (rule_id as Diagnostic
      Note) and M2 (fired trace via diag.Render) deferred — both are
      architectural cleanups that touch evaluator/localize.go and belong in
      a follow-up rather than sprawling T7.

  - batch: 4
    tasks: [T6]
    commit: pending
    reviewers:
      - id: test-reviewer-claude
        status: completed
        phase: A.5
        outcome: changes_requested
        gates: { test_quality: fail }
        issues: { critical: 0, high: 3, medium: 3, low: 4 }
        fix:
          - resolved: [H1 E0201 file:line:col resolution anchor, H2 NoBreak companion test, H3 codify want/got tokens in tasks.yaml]
      - id: code-reviewer-claude
        status: completed
        phase: C
        outcome: approved
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 0, medium: 2, low: 4 }
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 2
      low_issues: 4
    outcome: approved_after_fix
    notes: |
      Phase A.5 test review caught 3 tautology/weak-assertion issues before
      implementer started (position resolution anchor, break-contract
      companion, prescriptive wording). Tightening pre-GREEN saved a rework
      loop. Implementer deviated from design pseudocode by using
      `f.Constraint == token.OPTION` — correct per current CUE ast API
      (f.Optional is deprecated). Three-lane discipline clean; fast path
      preserves pre-T6 cost (one Subsume per rule when explain off).
      iter.Seq break semantics locked by paired CallerBreak + NoBreak tests.

  - batch: 7
    tasks: [T10, T11]
    commit: pending
    reviewers:
      - id: code-reviewer-claude-T10
        status: completed
        phase: C
        outcome: approved_after_fix
        gates:
          correctness: pass
          security: pass
          performance: pass
          architecture: pass
          style: pass
        issues: { critical: 0, high: 0, medium: 2, low: 3 }
        fix:
          - deferred: [M1 extractCodeFlag whole-slice scan, M2 missing-value error phrasing, L3 --format json ignored on --code, L4 usage line discoverability, L5 single-dash flag form untested]
      - id: test-reviewer-claude-T11
        status: completed
        phase: A.5
        outcome: approved_after_fix
        gates: { test_quality: pass }
        issues: { critical: 0, high: 1, medium: 3, low: 2 }
        fix:
          - resolved:
              - H1 fire-path block now carries [0] marker
              - F7 explicit exit-1 no-match block added (fas explain absent-path → diagnostic + [1])
              - F7 acceptance test #5 added (bare --explain default-missed)
              - F7 acceptance test #6 added (FAS_EXPLAIN=1 env var path)
              - L1 --code E0201 help block now carries [0] marker
          - deferred:
              - M2 provenance footer line number coupled to stdlib path.cue:42
              - M3 --explain=both ordering claim only exercises 2 rules (alphabetical == insertion)
              - L2 load-time E0501/E0502 blocks use fas eval rather than fas explain (intentional — load errors fire pre-rule-selection)
    synthesized:
      gates:
        correctness: pass
        security: pass
        performance: pass
        architecture: pass
        style: pass
        test_quality: pass
      critical_issues: 0
      high_issues: 0
      medium_issues: 5
      low_issues: 5
    outcome: approved_after_fix
    notes: |
      Final batch covering T10 (--code Exxxx flag) and T11 (scrut contract).
      T11 gained three new blocks closing the F7 acceptance-test gap: the
      bare --explain default-missed form, FAS_EXPLAIN=1 env-var path, and
      an explicit fas-explain exit-1 no-match block. All three were
      implicitly assumed working through unit tests but not pinned by the
      contract. scrut test -w . tests/diagnostics.md now reports 20/20.
      Remaining T10 medium issues (extractCodeFlag arg-walking edge case,
      missing-value error phrasing) are real but low-impact: deferred over
      sprawling the --code surface late in the scope.

deferred_issues:
  - batch: 7
    severity: medium
    file: cmd/fas/main.go
    line: 331
    description: extractCodeFlag scans the entire arg slice with no value-skip; `fas explain ... --config --code` would misread the flag-value `--code` as the flag itself. Low-likelihood real-world trigger, but a pre-scanner that respects `--<flag> <val>` pairs would be more correct.
  - batch: 7
    severity: medium
    file: cmd/fas/main.go
    line: 172
    description: Dual error paths (empty/missing value vs unknown code) emit identical "unknown error code %q" text — when value is missing, message reads `unknown error code ""` rather than something like `--code requires a value`.
  - batch: 7
    severity: medium
    file: tests/diagnostics.md
    line: 202
    description: Provenance footer hard-codes `/__fas_rules__/cue.mod/pkg/github.com/srnnkls/fas/cue/path/path.cue:42:1` — couples snapshot to stdlib file layout AND line number. Reformatting path.cue drifts the snapshot.
  - batch: 7
    severity: medium
    file: tests/diagnostics.md
    line: 417
    description: Narrative claims "Diagnostics appear in rule_id order" but the block only contains `absent-path` and `leaf-regex` — alphabetical and insertion order coincide. Add a third non-firing rule whose id sorts before `absent-path` to actually exercise the ordering claim.
  - batch: 7
    severity: low
    file: cmd/fas/main.go
    line: 182
    description: `--code` output bypasses --format json dispatch; format flag is silently ignored on this path. Either honor or document.
  - batch: 7
    severity: low
    file: cmd/fas/main.go
    description: usage line on stderr does not mention `--code` as an alternative to positional rule_id — discoverability gap.
  - batch: 7
    severity: low
    file: cmd/fas/main_test.go
    description: No coverage for single-dash forms (`-code E0201`, `-code=E0201`) which extractCodeFlag explicitly supports — drop the support or add a pinning test.
  - batch: 7
    severity: low
    file: tests/diagnostics.md
    description: Load-time E0501/E0502 blocks use `fas eval --harness claude` rather than `fas explain` — intentional (load errors fire pre-rule-selection) but not commented inline.

  - batch: 6
    severity: medium
    file: cmd/fas/main.go
    description: "`fas explain --harness claude myrule` (flag-before-positional) is rejected by the `strings.HasPrefix(args[0], \"-\")` guard. Documented in writeUsage as positional-first; consider walking args for the first non-flag token in a follow-up."
  - batch: 6
    severity: low
    file: cmd/fas/main.go
    description: isTruthyEnv uses `v == \"1\"` literal for digit branch and strings.EqualFold for word forms — minor asymmetry, tests pin exact behavior
  - batch: 6
    severity: low
    file: cmd/fas/main.go
    description: flag duplication between runExplain's private FlagSet and parseFlags (harness/config/global-config); consolidate with a shared registerCommonFlags helper after T9 lands
  - batch: 6
    severity: low
    file: cmd/fas/main.go
    description: findRuleByID is variadic `...[]config.Rule` but both call sites pass at most two; positional `(project, global []config.Rule)` would make project-wins self-documenting

  - batch: 5
    severity: medium
    file: cmd/fas/main.go
    description: rule_id prefix for missed diagnostics printed as separate line rather than attached as a Note inside evaluator/localize.go — fractures "one renderer" invariant; consider moving into Diagnostic.Notes in a follow-up
  - batch: 5
    severity: medium
    file: cmd/fas/main.go
    description: fired traces are hand-rolled plaintext ("fired: <id> (<source>)") rather than routed through diag.Render; inconsistent visual style across --explain output
  - batch: 5
    severity: low
    file: cmd/fas/main.go
    description: explainOff const declared but only used as iota zero value; either reference it in the enabled-check or drop
  - batch: 5
    severity: low
    file: cmd/fas/main.go
    description: renderExplain takes ruleSets variadic but every caller passes exactly two slices; variadic hides arity
  - batch: 5
    severity: low
    file: cmd/fas/main_test.go
    description: no smoke test pins token.Pos.Filename spelling — if CUE overlay path changes upstream, tests pass while --explain degrades

  - batch: 4
    severity: medium
    file: internal/evaluator/localize.go
    line: 62
    description: walkStruct passes `append(path, name)` — safe today but slice-aliasing footgun; consider slices.Concat for future-proofing
  - batch: 4
    severity: medium
    file: internal/evaluator/localize.go
    line: 71-73
    description: non-existent LookupPath silently skipped for leaf fields after outer Subsume failure — theoretical gap; monitor in T11 scrut
  - batch: 4
    severity: low
    file: internal/evaluator/localize.go
    description: listKeys eager on every E0201 emission; negligible but lazy Help is cheap future change
  - batch: 4
    severity: low
