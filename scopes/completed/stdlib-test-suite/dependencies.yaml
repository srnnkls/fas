# Dependencies: stdlib-test-suite
# Machine + human readable DAG for parallel dispatch
#
# Revised post-/scope-review: each new CUE test layer lives in its OWN _test.go
# file so it genuinely parallelizes (the prior plan serialized 4 writers on
# cue/stdlib_test.go). STS-007 removed — already implemented (see tasks.yaml).

phases:
  - id: foundation
    name: Foundation
    tasks:
      - id: STS-001
        file: cue/testdata/
        depends_on: []

  - id: units
    name: Spec-derived units
    tasks:
      - id: STS-002
        file: cue/stdlib_test.go
        depends_on: [STS-001]
      - id: STS-003
        file: cue/stdlib_differential_test.go
        depends_on: [STS-001]
      - id: STS-011
        file: cue/stdlib_fuzz_test.go   # spike scaffolding
        depends_on: [STS-001]
      - id: STS-004
        file: cue/stdlib_fuzz_test.go
        depends_on: [STS-001, STS-011]

  - id: structural
    name: Structural
    tasks:
      - id: STS-005
        file: cue/stdlib_derivation_test.go
        depends_on: []
      - id: STS-006
        file: cue/stdlib_composition_test.go
        depends_on: []
      - id: STS-009
        file: tests/policy_drift_test.go
        depends_on: []

  - id: integration
    name: Integration
    tasks:
      - id: STS-008
        file: tests/policies.md
        depends_on: [STS-002, STS-003]
      - id: STS-010
        file: hk.pkl
        depends_on: [STS-002, STS-003, STS-004, STS-005, STS-006, STS-008, STS-009]

# ------------------------------------------------------------------------------
# Computed parallel batches. Every task in a batch writes a DISTINCT file, so
# batches are truly parallel. STS-011 and STS-004 share cue/stdlib_fuzz_test.go
# AND have a dep edge, so they are correctly in different batches.
# ------------------------------------------------------------------------------
batches:
  - batch: 1
    tasks: [STS-001, STS-005, STS-006, STS-009]   # no deps; distinct files
  - batch: 2
    tasks: [STS-002, STS-003, STS-011]            # need STS-001; distinct files
  - batch: 3
    tasks: [STS-004, STS-008]                      # STS-004 needs STS-011; STS-008 needs STS-002/003; distinct files
  - batch: 4
    tasks: [STS-010]

actions:
  - id: STS-011
    note: "Throughput spike; its outcome selects STS-004's mode (live Go fuzz vs table-driven property test)."
  - id: STS-010
    note: "Edits build config (hk.pkl/mise) + docs (AGENTS.md); runs after all test tasks land."
