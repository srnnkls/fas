tasks:
  - id: STS-001
    content: "testdata corpora + Go loader: cue/testdata/{rm_flags,system_paths,commands,destructive_actions,escalation}.tsv with a stdlib-only loader helper. Format: `input <TAB> expected` where expected ∈ {match, nomatch}; no header; tabs in input column escaped as \\t (see design.md §Corpus format)"
    status: completed
    active_form: "Building testdata corpora and loader"
    depends_on: []

  - id: STS-002
    content: "Rewrite per-matcher tests as spec-derived tables from testdata (flag.#hasRm*, command.#is*, action.#destructiveAction, escalation.#escalationCommand); include lookalikes, case variants, =value forms (flag long forms), pinned non-matches. tool.#Tool/hook.#Agent are NOT in this set — covered by STS-005."
    status: completed
    active_form: "Rewriting matcher tests as spec-derived tables"
    depends_on: [STS-001]

  - id: STS-003
    content: "Cross-matcher differential test (new file cue/stdlib_differential_test.go): systemTarget ↔ systemInCommand over the shared path corpus, restricted to the input subset where they SHOULD agree; exhaustive whitelist of documented divergences + meta-assertion that the whitelist contains no prefix-boundary case (e.g. /etcfoo)"
    status: completed
    active_form: "Writing systemTarget↔systemInCommand differential test"
    depends_on: [STS-001]

  - id: STS-011
    content: "SPIKE: extract a reusable compiled-matcher closure (load flag sub-package + lookupDef ONCE → func(token) bool doing only CompileString+Unify+Validate) and measure throughput; resolve token-level vs list-level model. Outcome gates STS-004: live Go fuzz if fast enough, else table-driven property test over the seed corpus."
    status: completed
    active_form: "Spiking reusable compiled-matcher throughput"
    depends_on: [STS-001]

  - id: STS-004
    content: "Property/fuzz (new file cue/stdlib_fuzz_test.go): rm-flag family vs hand-written man-rm-derived reference predicate (authored WITHOUT reading rm.cue). Mode (live fuzz vs property-table) per STS-011 outcome. Go fuzz seeds as []byte under testdata/fuzz/<Fn>/ generated from the .tsv corpus."
    status: completed
    active_form: "Building rm-flag fuzz/property harness vs reference predicate"
    depends_on: [STS-001, STS-011]

  - id: STS-005
    content: "Vocabulary invariant (new file cue/stdlib_derivation_test.go): assert catalog.#ToolName↔tool.#Tool and catalog.#AgentType↔hook.#Agent round-trip (every member ⇒ a matcher member and vice versa). Event names are ALREADY covered by TestEventSet_NoDriftAcrossSources — this adds the tool/agent axes. Subsumes tool.#Tool/hook.#Agent coverage."
    status: completed
    active_form: "Writing catalog↔binder derivation invariant"
    depends_on: []

  - id: STS-006
    content: "Composition tests (new file cue/stdlib_composition_test.go): a real 4-way & chain matches intended input AND negative composition (one failing conjunct ⇒ whole fails)"
    status: completed
    active_form: "Writing composition positive+negative tests"
    depends_on: []

  - id: STS-007
    content: "Loader-contract: undefined catalog member fails at load (tool.#Tool.Bsh, hook.#Agent.Explor)"
    status: completed
    active_form: "Loader typo-rejection tests"
    evidence:
      files:
        - internal/config/loader_test.go
      tests:
        - TestLoadRules_TypoedToolRef_Rejected
        - TestLoadRules_TypoedAgentRef_Rejected
      note: "Pre-existing. Member-typo rejection already proven end-to-end at the config layer; per-sub-package overlay duplication adds little. Closed via /scope review (C2). INV-6 satisfied."

  - id: STS-008
    content: "Scrut completeness: every shipped policy has ≥1 deny AND ≥1 near-miss allow (def + per-policy example in design.md §Near-miss allow); add missing allow cases; add a gap-reporting check. Requires a policy.cue→scrut-block mapping (naming convention or manifest) defined first."
    status: completed
    active_form: "Pinning scrut allow/deny coverage per policy"
    depends_on: [STS-002, STS-003]

  - id: STS-009
    content: "Generalize tests/policy_drift_test.go via a CURATED MAP keyed by each exported stdlib regex string (no source-grepping, no CUE-API walk): any policy inlining a listed regex fails; error names the helper. Map maintained alongside the stdlib."
    status: completed
    active_form: "Generalizing the inline-regex drift guard"
    depends_on: []

  - id: STS-010
    content: "CI/docs: wire fuzz/property seed-run into hk.pkl/mise test task (go test runs seed corpus without -fuzz); document oracle-independence + 'go install ./cmd/fas before scrut' + the new-bug-mid-implementation rule in AGENTS.md/test docs"
    status: pending
    active_form: "Wiring seed-run and documenting methodology"
    depends_on: [STS-002, STS-003, STS-004, STS-005, STS-006, STS-008, STS-009]

