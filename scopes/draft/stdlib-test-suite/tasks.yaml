        - "inlined exported regex in a policy ⇒ red"
      verified: false
  - name: "Phase 4: Integration"
    task_ids: [STS-008, STS-010]
    checkpoint:
      description: goldens complete, CI wired, methodology documented
      criteria:
        - "every policy has deny + near-miss allow"
        - "seed-run in hk/mise; go test ./... green and deterministic"
