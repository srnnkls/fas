    status: pending
    depends_on: [T2, T3]
    test_hints:
      - `scrut test tests/policies.md` succeeds for all blocks (existing + new).
      - Go test suite remains green.

  - id: T6
    subject: Document subsumption model in AGENTS.md
    description: >
      Add an "Authoring rules" section to `AGENTS.md` covering: (a) the
      rule's `when` IS the pattern the input must fit; (b) subsumption is
      the evaluation primitive; (c) structural negation via De Morgan +
      CUE leaves; (d) sibling refs / let / if / list patterns replace any
      need for a binding name; (e) what the lint rejects. Short — one page.
    files:
