    status: pending
    depends_on: [T1, T4]
    test_hints:
      - AGENTS.md has a section titled "Authoring rules".
      - De Morgan example table present (not (a=1 AND b=2) → {a: !=1} | {b: !=2}).
      - "Rule is pattern, not predicate" framing documented.
