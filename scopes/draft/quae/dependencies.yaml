external:
  - name: cuelang.org/go
    version: ">=0.11"
    purpose: CUE evaluator — structural unification, schema validation, rule loading
    phase: P1

  - name: mvdan.cc/sh
    version: ">=3.9"
    purpose: Builtin Bash parser — AST extraction (program, args, redirections, pipes, flags)
    phase: P1

  - name: github.com/tetratelabs/wazero
    version: ">=1.8"
    purpose: Wasm runtime — signal modules and parser modules with fuel/memory sandboxing
    phase: P3

  - name: github.com/itchyny/gojq
    version: ">=0.12"
    purpose: jq parser backend — in-process jq execution for parser modules
    phase: P3

internal:
  # P1 dependency chain
  - from: T1
    to: [T2, T4, T5, T6, T7, T8]
    reason: All P1 tasks need project scaffolding

  - from: T2
    to: [T3, T8]
    reason: Evaluator and stdlib need schema definitions; rule loader feeds evaluator

  - from: T4
    to: T3
    reason: Evaluator needs preprocessed input with parsed structure

  - from: T3
    to: T5
    reason: Synthesizer needs evaluation results (matched actions)

  - from: [T5, T6]
    to: T7
    reason: CLI wraps full pipeline including adapter and synthesizer

  - from: T3
    to: T6
    reason: Claude Code adapter needs evaluator output types (OutputEnvelope)

  - from: T3
    to: T9
    reason: Two-phase evaluation builds on single-scope evaluator

  - from: T8
    to: T9
    reason: Config resolution loads stdlib as part of rule loading

  # P2 dependency chain
  - from: T6
    to: [T10, T11, T12]
    reason: Subsequent adapters follow pattern established by Claude Code adapter

  - from: [T10, T11, T12]
    to: T13
    reason: Auto-detection needs adapters to exist

  - from: [T2, T6, T4]
    to: T14
    reason: Validation commands test rules, adapters, and parsers

  - from: T7
    to: T15
    reason: Init scaffolding is a CLI subcommand

  # P3 dependency chain
  - from: T16
    to: [T17, T19]
    reason: Signal engine and Wasm/tree-sitter parser backends need Wasm runtime

  - from: T3
    to: T17
    reason: Signal engine feeds enriched input to evaluator

  - from: T16
    to: T18
    reason: Module lockfile verifies Wasm/jq artifacts loaded by runtime

  - from: T4
    to: T19
    reason: Additional parser backends plug into preprocessor framework

  - from: T18
    to: T20
    reason: validate-modules depends on module lockfile system

  # Integration tests — after all vendor adapters land so every harness is exercised
  - from: [T7, T6, T10, T11, T12]
    to: T21
    reason: Scrut integration tests exercise `quae eval` across every vendor harness
