batch_reviews:
  - batch: 1
    tasks: [T1]
    phases:
      tester:
        subagent: task-tester
        artifact: scripts/verify-scaffolding.sh
        assertions: 22
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: pass
        deferred_mediums: 6
        recommendation: proceed_to_implementer
      implementer:
        subagent: task-implementer
        files:
          - go.mod
          - cmd/quae/main.go
          - internal/adapter/package.go
          - internal/config/package.go
          - internal/evaluator/package.go
          - internal/parser/package.go
          - internal/synthesis/package.go
          - Makefile
          - .github/workflows/ci.yml
          - mise.toml
          - hk.pkl
        green_verified: true
      code_review:
        subagent: task-reviewer
        status: approved
        recommendation: commit
      fix_pass:
        fixes:
          - internal/*/doc.go → package.go (5 files)
          - CI workflow permissions:contents:read
        still_green: true
    outcome: approved

  - batch: 2
    tasks: [T2, T4, T8]
    phases:
      testers:
        parallel: 3
        artifacts:
          - internal/config/loader_test.go
          - internal/config/schema_test.go
          - cue/schema_test.go
          - internal/parser/preprocessor_test.go
          - internal/parser/bash_test.go
          - cue/stdlib_test.go
        red_verified: true
      test_reviews:
        parallel: 3
        outcomes:
          T2: pass (3 mediums deferred)
          T4: pass (5 mediums deferred)
          T8: changes_requested → fixed inline (added -fvr / -if short-combo permutations)
      implementers:
        parallel: 3
        files:
          - cue/schema.cue
          - cue/embed.go
          - internal/config/schema.go
          - internal/config/loader.go
          - internal/config/schema_cache.go
          - internal/parser/parsed.go
          - internal/parser/preprocessor.go
          - internal/parser/bash.go
          - internal/parser/actions.go
          - cue/quae.cue
          - cue/flags/rm.cue
        green_verified: true
      code_reviews:
        parallel: 3
        outcomes:
          T2: approved (6 mediums — one T3-blocker: Rule.When needed cue.Value)
          T4: changes_requested (2 HIGH — AST compound-stmt gaps; subcommand resolution with global flags)
          T8: approved (4 mediums — design.md spec defects on CUE syntax)
      fix_pass:
        parallel: 3
        fixes:
          T4:
            - HIGH — AST walking via syntax.Walk covering all compound types
            - HIGH — resolveVerb scans first non-flag token in rest
            - MEDIUM — dead insideSubshell param removed
            - MEDIUM — command-substitution leak suppressed
            - MEDIUM — POSIX `--` end-of-flags honored
            - MEDIUM — ParseBash dead error return dropped
            - MEDIUM — Parsed JSON snake_case tags added
            - MEDIUM — malformed tool_input on known tools surfaces parse_error
            - NEW TESTS — ForLoop / IfBranch / GitWithGlobalFlag / DoubleDashEndsFlags / CmdSubstitution
          T2:
            - Rule.When now cue.Value (unblocks T3)
            - sync.Once schema cache (perf)
            - Tests now exercise //go:embed via SchemaSource()
          T8:
            - Agent blocked — design.md spec defects discovered
            - design.md fixed by orchestrator - list.MatchN takes a single schema (not a list); #HasRm* inlines list.MatchN (AND-composition conflicts on #re if composed via #HasFlagMatching)
    outcome: approved

  - batch: 3
    tasks: [T3]
    phases:
      tester:
        subagent: task-tester
        artifact: internal/evaluator/evaluator_test.go
        tests: 14
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: pass
        deferred_mediums: 3
        recommendation: proceed_to_implementer
      implementer:
        subagent: task-implementer
        files:
          - internal/evaluator/evaluator.go
        green_verified: true
      code_review:
        subagent: task-reviewer
        status: approved
        issues: 0
        recommendation: commit
    outcome: approved

  - batch: 4
    tasks: [T5, T6, T9]
    bootstrap:
      artifact: internal/envelope/{envelope.go,input.go,envelope_test.go}
      note: "Shared adapter-agnostic types (OutputEnvelope, Category, Input, SignalResult) created upfront so T5/T6/T9 could run in parallel without cross-dependencies."
    phases:
      testers:
        parallel: 3
        artifacts:
          T5: internal/synthesis/synthesis_test.go (24 tests)
          T6: internal/adapter/claudecode_test.go (19 tests)
          T9: internal/pipeline/pipeline_test.go (12 tests)
        red_verified: true
      test_reviews:
        parallel: 3
        outcomes:
          T5: pass (2 mediums deferred)
          T6: pass (3 mediums deferred)
          T9: pass (3 mediums deferred)
      implementers:
        parallel: 3
        files:
          T5: [internal/synthesis/synthesis.go]
          T6: [internal/adapter/adapter.go, internal/adapter/claudecode.go]
          T9: [internal/pipeline/pipeline.go]
        green_verified: true
        notes:
          - "T9 fixed 6 pipeline_test.go fixtures: channel: 'system_reminder' → 'agent' (schema enum is *agent|user)"
          - "golangci-lint --fix auto-applied QF1001 De Morgan's law simplification to synthesis_test.go"
      code_reviews:
        parallel: 3
        outcomes:
          T5: approved (3 mediums deferred)
          T6: approved (3 mediums — fix_pass addressed 2)
          T9: approved (0 issues)
      fix_pass:
        T6:
          - HIGH (security) — permissionDecisionFor default now returns "deny" (fail-closed on unknown Category)
          - Added `var _ Adapter = ClaudeCode{}` compile-time interface assertion
    outcome: approved

  - batch: 8
    tasks: [T2-T8-typed-events]
    note: "Typed hook events: #HookEventName literal union + per-event typed structs (#PreToolUse, #PostToolUse, #UserPromptSubmit, #Stop, #SubagentStart, #Notification). Rule authors can write `when: quae.#PreToolUse & quae.#isBash & quae.#hasSystemTarget` with CUE enforcing per-event required fields (tool_name for PreToolUse/PostToolUse, prompt for UserPromptSubmit). No `*` default markers."
    phases:
      tester:
        subagent: task-tester
        artifacts:
          - cue/events_test.go (14 tests)
          - internal/config/stdlib_import_test.go (2 added tests)
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: pass
        deferred_mediums: 2
        recommendation: proceed_to_implementer
      implementer:
        subagent: task-implementer
        files:
          - cue/schema.cue (added #HookEventName, retyped hook_event_name)
          - cue/events.cue (new — typed event structs)
          - cue/embed.go (added events.cue to StdlibFS)
          - internal/evaluator/evaluator.go (honor ? optional-field semantics in inputSatisfies)
        green_verified: true
        notes:
          - "First implementer hit CUE Validate(Concrete) semantics issue and went beyond scope"
          - "Fix pass resolved: two-step eventsUnifyFail helper, concrete composition inputs, evaluator ? semantics, #Parsed loosening, then restoration"
          - "#Parsed list-field types relaxed from [...string] to _ to avoid eager empty-list validation against list.MatchN(>0, ...); canonical namespace still referenced via tool_input.parsed?: #Parsed"
      code_review:
        subagent: task-reviewer
        status: changes_requested → fixed
        issues_found:
          - "#Parsed orphaned — addressed by restoring binding + relaxing list types"
          - "False-positive scrut regression claim (reviewer ran stale state; verified actual 21/21)"
          - "False-positive evaluator-change claim (inputSatisfies `?` skip is semantically correct)"
    outcome: approved

  - batch: 7
    tasks: [T8-stdlib-import-closure]
    note: "Closes the T8 gap: rule files can now `import \"github.com/srnnkls/quae/cue:quae\"` and reference `quae.#hasSystemTarget`, `quae.#HasRmForce`, etc. without inlining. Loader uses `cuelang.org/go/cue/load` with an in-memory overlay that synthesizes a module hosting the embedded stdlib."
    phases:
      tester:
        subagent: task-tester
        artifact: internal/config/stdlib_import_test.go (4 tests)
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: changes_requested → fixed inline (oracle mirroring removed; premature policy refactor reverted; unused const dropped; errors.As against cue/errors.Error added)
        recommendation: proceed_to_implementer (after fix)
      implementer:
        subagent: task-implementer
        files:
          - internal/config/loader.go (overlay compile path)
          - cue/embed.go (StdlibFS, StdlibImportPath)
          - cue/flags/rm.cue (import "list" now that files are standalone)
          - cue/stdlib_test.go (harness strips imports when concatenating)
          - tests/policies/system_paths.cue (refactored to use quae.#hasSystemTarget)
        green_verified: true
      code_review:
        subagent: task-reviewer
        status: approved
        deferred_mediums: 3
        recommendation: commit
    outcome: approved

  - batch: 6
    tasks: [T21-claude-slice]
    note: "T21 partially landed for Claude harness only. Full T21 completion waits on T10/T11/T12 vendor adapters."
    phases:
      tester:
        subagent: task-tester
        artifact: tests/policies.md (21 scrut testcases)
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: pass
        deferred_mediums: 4
        recommendation: proceed_to_implementer
      implementer:
        subagent: task-implementer
        files:
          - tests/policies/system_paths.cue
          - tests/policies/system_paths_command.cue
          - tests/policies/git_no_verify.cue
          - tests/policies/git_push_no_verify.cue
          - tests/policies/destructive_home.cue
          - tests/policies/secret_files.cue
        green_verified: true
      code_review:
        subagent: task-reviewer
        status: approved
        deferred_mediums: 4
        recommendation: commit
      fix_pass:
        - fixed M1 — split git_no_verify: commit/merge accept -n|--no-verify; push only --no-verify (false-positive on `git push -n` which means --dry-run)
        - fixed M4 — system_paths_command.cue scoping (already present, normalized style)
    outcome: approved

  - batch: 5
    tasks: [T7]
    phases:
      tester:
        subagent: task-tester
        artifact: cmd/quae/main_test.go
        tests: 15
        red_verified: true
      test_review:
        subagent: task-reviewer
        status: pass
        deferred_mediums: 4
        recommendation: proceed_to_implementer
      implementer:
        subagent: task-implementer
        files:
          - cmd/quae/main.go
        green_verified: true
      code_review:
        subagent: task-reviewer
        status: approved
        deferred_mediums: 3
        recommendation: commit
    outcome: approved

deferred_issues:
  # Batch 1 — from test_review on scripts/verify-scaffolding.sh
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "Line 69 `continue` skips .go-file check when dir is missing; upstream assertion already failed. Add a clarifying comment."
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "`make -n <target>` can give misleading exit codes on BSD/macOS make. Consider `make -np | grep -E '^<target>:'` as a fallback."
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "CGO_ENABLED grep for mise.toml doesn't accept single-quoted TOML values. Broaden to `\"?0\"?|'?0'?`."
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "No explicit `grep -E '^module ' go.mod` check. `go build` catches it transitively but a direct assertion gives a clearer failure message."
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "No self-check that the script retains its executable bit. A one-liner `[[ -x scripts/verify-scaffolding.sh ]]` would protect against accidental chmod regressions."
  - batch: 1
    severity: medium
    from: test_review
    path: scripts/verify-scaffolding.sh
    note: "`printf -- '----\\n'` uses an unneeded `--` guard. Minor style."
  - batch: 1
    severity: medium
    from: code_review
    path: mise.toml
    note: "Consider adding `[env] CGO_ENABLED = \"0\"` so interactive-shell `go build` invocations also get the enforcement. Makefile already covers the built paths."

  # Batch 2 — T2 mediums not fixed in fix-pass
  - batch: 2
    severity: medium
    from: code_review
    task: T2
    path: internal/config/loader.go
    note: "Action is a flat struct with Kind discriminator rather than a Go sum type. Works but doesn't enforce 'only Kind-relevant fields populated' at compile time. Document the invariant or refactor to Body interface in a T3-era refactor."
  - batch: 2
    severity: medium
    from: code_review
    task: T2
    path: internal/config/loader.go
    note: "Rule files require top-level `rule:` container. Undocumented in rule-author-facing spec. Add package doc and richer error message when missing."
  - batch: 2
    severity: medium
    from: code_review
    task: T2
    path: internal/config/loader.go
    note: "decodeAction iterates ActionKind values relying on disjunction non-overlap. Add a comment or switch to CUE's disjunction-introspection API."

  # Batch 2 — T8 code-review mediums
  - batch: 2
    severity: medium
    from: code_review
    task: T8
    path: cue/flags/rm.cue
    note: "Long-form alternation accepts single-dash `-force` in addition to `--force`. Tests assert this is intentional; worth adding a comment naming the lenient-matching choice."
  - batch: 2
    severity: medium
    from: code_review
    task: T8
    path: cue/flags/rm.cue
    note: "Zero comments on #rmShortClass. Add a one-line contract note explaining the single-source-of-truth intent, as cheap insurance against future reintroduction of the broken template-comprehension pattern."

  # Batch 4 — T5 mediums
  - batch: 4
    severity: medium
    from: code_review
    task: T5
    path: internal/synthesis/synthesis.go
    note: "json.Marshal error on UpdatedInput is silently swallowed. For map[string]any this can't realistically fail, but a func/chan/cycle value would be lost without signal. Either document the invariant or return an error from Synthesize."
  - batch: 4
    severity: medium
    from: code_review
    task: T5
    path: internal/synthesis/synthesis.go
    note: "Budget newline accounting treats concatenated output as a single stream, but the envelope splits injects across agent/user channels. Cross-channel truncation behavior is not covered by a test — either split budgets per-channel or add a test that pins the current shared-budget semantics."
  - batch: 4
    severity: medium
    from: code_review
    task: T5
    path: internal/synthesis/synthesis.go
    note: "`deduped := sorted[:0]` aliases the backing array. Safe here but regression-prone. Prefer `make([]*config.Action, 0, len(sorted))`."

  # Batch 4 — T6 medium (fail-closed + interface-assertion fixed inline)
  - batch: 4
    severity: medium
    from: code_review
    task: T6
    path: internal/adapter/claudecode.go
    note: "ccInput.TranscriptPath is decoded but never used. Remove the field or use `json:\"-\"` once documentation purpose is served elsewhere."

  # Batch 4 — T9 mediums (test-quality)
  - batch: 4
    severity: medium
    from: test_review
    task: T9
    path: internal/pipeline/pipeline_test.go
    note: "TestEvaluatePhases_Phase1InjectOnly_NoGate_Phase2Runs uses a conditional fallback between ruleIDs and kind-based checks. Tighten by asserting kinds directly."
  - batch: 4
    severity: medium
    from: test_review
    task: T9
    path: internal/pipeline/pipeline_test.go
    note: "TestEvaluatePhases_MalformedPhase1_ErrorReturned has an orphan `_ = errors.Unwrap(err)` — drop it or strengthen the contract."
  - batch: 4
    severity: medium
    from: test_review
    task: T9
    path: internal/pipeline/pipeline_test.go
    note: "Error-path tests use substring checks on error messages. Consider a sentinel error + errors.Is once implementer lands a stable contract."

  # Batch 5 mediums — T7 CLI polish
  - batch: 5
    severity: medium
    from: code_review
    task: T7
    path: cmd/quae/main.go
    note: "Adapter registry is switch + parallel supportedHarnesses slice. Collapse to a package-level map[string]adapter.Adapter so adding a harness is a single edit."
  - batch: 5
    severity: medium
    from: code_review
    task: T7
    path: cmd/quae/main.go
    note: "printUsage is a one-line wrapper around writeUsage with no callers that couldn't target writeUsage directly. Inline and drop."
  - batch: 5
    severity: medium
    from: code_review
    task: T7
    path: cmd/quae/main.go
    note: "parseFlags accepts a stderr io.Writer parameter that's only used as the FlagSet output sink. Rename parameter to `out` to match its role."

  # Batch 5 test-review mediums
  - batch: 5
    severity: medium
    from: test_review
    task: T7
    path: cmd/quae/main_test.go
    note: "TestRun_ConfigPathDoesNotExist_TreatedAsEmpty pins 'missing --config dir treated as empty, exit 0, allow' as contract. design.md/tasks.yaml don't explicitly specify this; worth confirming with spec owner."
  - batch: 5
    severity: medium
    from: test_review
    task: T7
    path: cmd/quae/main_test.go
    note: "TestRun_MissingHookEventName_FailClosed_EmitsBlocking only asserts reason != ''. Tighten to assert substring like 'parse'/'hook_event_name' for actionable messages."
  - batch: 5
    severity: medium
    from: test_review
    task: T7
    path: cmd/quae/main_test.go
    note: "TestRun_EffectsAccumulate_AcrossPhases only exercises channel=agent. Add a second case with channel=user to cover both routing paths."

  # Batch 7 — stdlib-import mediums
  - batch: 7
    severity: medium
    from: code_review
    task: T8
    path: cue/embed.go
    note: "`//go:embed quae.cue flags/*.cue` doesn't auto-pick up future non-flags directories like `cue/shell/`. Widen to `all:.` when a second helper directory lands."
  - batch: 7
    severity: medium
    from: code_review
    task: T8
    path: internal/config/loader.go
    note: "buildStdlibOverlay() is rebuilt on every LoadRules call. Cheap perf win: cache via sync.OnceValues alongside schema_cache.go. Symmetric with loadSchema()."
  - batch: 7
    severity: medium
    from: code_review
    task: T8
    path: internal/config/loader.go
    note: "sanitizeVirtualRuleName has an explain-what-not-why comment. Drop or compress to one line about why the ext check exists."

  # Batch 6 — T21 Claude slice mediums + T4 parser gap discovered during impl
  - batch: 6
    severity: medium
    from: code_review
    task: T21
    path: tests/policies/secret_files.cue
    note: "`\\.env\\b` word-boundary regex correctly rejects .envrc but would match credentials.json.bak. Not exercised by fixtures; acceptable for a test fixture."
  - batch: 6
    severity: medium
    from: code_review
    task: T21
    path: tests/policies/system_paths_command.cue
    note: "Command-regex fallback would match benign inputs like a system-path substring inside an echoed comment. No fixture exercises it. If this graduates beyond tests/, prefer an AST-based ForClause walk (see T4 parser gap below)."
  - batch: 6
    severity: high
    type: parser_gap
    from: implementer_discovery
    task: T4
    path: internal/parser/bash.go
    note: "ForClause header glob expansions (`for f in GLOB; do CMD $f; done`) don't reach parsed.targets — only CallExpr args do. The T4 AST walker fix recurses into ForClause.Do (catches the nested CMD), but doesn't collect the word list after `in`. T21 worked around this with tests/policies/system_paths_command.cue (command-regex fallback). Fix: extend the walker to also collect ForClause.Items into parsed.targets when they look path-shaped. Once fixed, the fallback rule can be retired."
