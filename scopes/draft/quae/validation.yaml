clarification_log:
  - question: Relationship to cupcake?
    answer: Entirely separate project. Different author, different approach.
    area: scope

  - question: Delivery scope for v0.1?
    answer: Multi-vendor with vendor-agnostic core + vendor-specific adapters
    area: scope

  - question: Repository location?
    answer: New standalone repo
    area: scope

  - question: CUE list matching approach?
    answer: "Pure CUE: list.MatchN + or() + strings.Join in a standard library (quae.cue). No Go-computed derived booleans. Three layers: value lists, constraint definitions, structural constraints."
    area: behavior

  - question: Rules organization on disk?
    answer: "Layered configs: global (~/.config/quae/) + project (.quae/)"
    area: behavior

  - question: Built-in rules?
    answer: No defaults. Blank slate.
    area: behavior

  - question: Primary interface?
    answer: stdin/stdout JSON
    area: integration

  - question: Vendor discovery?
    answer: Explicit --harness flag with auto-detect fallback
    area: integration

  - question: Performance budget?
    answer: <50ms per evaluation
    area: constraints

  - question: Error handling for malformed input?
    answer: "Configurable: default fail-open, optional fail-closed"
    area: constraints

  - question: Feature prioritization?
    answer: "MVP First: P1 core engine (Go parsing, adapters, canonical #Parsed, CUE stdlib), P2 multi-vendor + tooling, P3 extensibility (Wasm signals, custom parser backends, module lockfile)"
    area: scope

  - question: Implementation approach?
    answer: "MVP First: ship P1 with builtin Go parsers only, iterate based on usage"
    area: scope

  - question: Architecture approach?
    answer: "CUE Unify() loop — structural unification of when-clauses against input. Signals and custom parser backends deferred to P3."
    area: behavior

  - question: How does `modify` reconcile with Claude Code's PreToolUse hook, which has no payload-rewrite mechanism?
    answer: "CC adapter rejects rules emitting `modify` at rule-load time. `modify` stays defined for vendors whose protocols support input rewriting (Cursor, OpenCode). Adapter capabilities are declared and checked statically — no silent degradation."
    area: integration

  - question: Are halt/deny/block semantically distinct, or just severity differences?
    answer: "Collapsed to a single `deny` gate with a `severity` field (LOW/MEDIUM/HIGH/CRITICAL). Gate priority is now deny > ask > allow."
    area: data_model

  - question: Does quae support cross-call state (retries, prior approvals, rate limits)?
    answer: "No. Non-goal for v0.1–v0.3. Each hook event is evaluated independently. Rules are pure constraints over a single `#Input`; there is no state backend. Called out explicitly in spec.md and design.md."
    area: scope

  - question: Does `parsed.actions` contain command names (`rm`) or semantic verbs (`remove`)?
    answer: "Semantic verbs only. Command names live on the raw input (`tool_input.command` for Bash), not in `actions`. `#DestructiveActions` drops `rm` to avoid the conflation."
    area: data_model

  - question: Is the jq parser backend sandboxed?
    answer: "No — `gojq` is reproducible but lacks fuel/memory bounds. jq backend is deferred until a sandboxed execution path exists. P3 parser backends: builtin Go, regex, tree-sitter (Wasm), Wasm."
    area: constraints

  - question: Does the `#FlagSet` template in the stdlib work as written?
    answer: "No — `_|_` iteration source and clashing `[Name=_]` templates make it non-evaluable. Replaced with per-tool constraint files: one `#HasFlagMatching` building block in the stdlib, explicit `#Has<Tool><Flag>` constraints per tool (short-letter class written as a concrete string)."
    area: data_model

