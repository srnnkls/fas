tasks:
  # P1 — Core Engine
  - id: T1
    title: Project scaffolding
    priority: P1
    estimate: S
    status: completed
    description: >
      Go module init, directory structure, CI setup, Makefile/justfile.
      Package layout: cmd/quae/, internal/{adapter,config,evaluator,parser,synthesis}/.
      CGO_ENABLED=0 enforced in build config.

  - id: T2
    title: CUE schema definitions & rule loader
    priority: P1
    estimate: M
    status: completed
    description: >
      Define #Input, #Parsed, #Rule, #Action, #Meta CUE schemas.
      Load .cue rule files from a directory. Parse into structured rule objects
      with when/then/meta clauses using cuelang.org/go. Validate against #Rule schema.
      Schema validation step: unify adapter output against #Input as defense-in-depth.

  - id: T3
    title: CUE unification evaluator
    priority: P1
    estimate: M
    status: completed
    description: >
      For each loaded rule, unify rule.when against input. Evaluate if-guards
      for cross-field logic. Collect actions from rules where then exists after
      evaluation. Supports optional then (rules can match without producing actions).

  - id: T4
    title: Preprocessor framework & builtin Go parsers
    priority: P1
    estimate: L
    status: completed
    description: >
      Parser dispatch by tool_name. Emit #Parsed at tool_input.parsed. Unknown
      tools pass through. Builtin Go parsers for common tools (Bash via
      mvdan.cc/sh, file operations). Extract canonical #Parsed shape: actions,
      targets, flags, attributes. Parsers write only to tool_input.parsed namespace.

  - id: T5
    title: Synthesizer & gate dispatch
    priority: P1
    estimate: M
    status: completed
    description: >
      Produce OutputEnvelope from matched rule actions. Gate selection: pick
      winning gate (deny > ask > allow). Inject aggregation:
      sort by (priority, rule_id), dedup by rule_id, truncate by size budget.
      Modify selection: highest priority, tie-break by rule_id. Drop
      UpdatedInput if gate is Blocking. Gate dispatch: map gate action to
      Category (Blocking/Asking/Allowing). Hardcoded, not configurable.

  - id: T6
    title: Claude Code adapter
    priority: P1
    estimate: M
    status: completed
    description: >
      Implement Adapter interface: ParseInput() normalizes Claude Code hook
      event JSON (PreToolUse, PostToolUse, UserPromptSubmit, SubagentStart,
      Stop) to internal Input. Handles JSON-in-JSON parsing, field renaming,
      event type inference, tool name normalization. RenderOutput() renders
      OutputEnvelope as Claude Code response JSON, routing UserReason/AgentReason
      to vendor-appropriate fields by Category. Declares adapter capabilities;
      rejects rules emitting `modify` actions at rule-load time (CC's PreToolUse
      hook has no payload-rewrite mechanism).

  - id: T7
    title: CLI eval command
    priority: P1
    estimate: M
    status: completed
    description: >
      quae eval reads stdin JSON, runs full pipeline, writes stdout JSON.
      Flags: --harness, --config, --fail-closed. Exit code 0 on success,
      non-zero on engine error.

  - id: T8
    title: CUE standard library (quae.cue)
    priority: P1
    estimate: M
    status: completed
    description: >
      Ship quae.cue with stable vocabulary and composable constraints.
      Layer 1: value lists (#SystemPrefixes, #EscalationCommands,
      #DestructiveActions). Layer 2: derived constraints (#systemTarget via
      strings.Join, #escalationCommand via or(), #destructiveAction via or()).
      Layer 3: structural constraints (#hasSystemTarget, #hasPrivilegeEscalation,
      #hasDestructiveAction, #isPreToolUse, #isBash, #isUserPrompt).
      FlagSet template pattern: #FlagSpec, #FlagSet, #HasFlagMatching for
      safe short-combo matching with tool-specific short-letter classes.

  - id: T9
    title: Two-phase evaluation & config resolution
    priority: P1
    estimate: M
    status: completed
    description: >
      Global rules (~/.config/quae/rules/*.cue) evaluate first. Blocking
      gates short-circuit phase 2, but effects always accumulate across
      phases. Project rules (.quae/rules/*.cue) evaluate second. Config
      resolution order for rules, parsers, and schemas.

  # P2 — Multi-Vendor + Tooling
  - id: T10
    title: Cursor vendor adapter
    priority: P2
    estimate: M
    description: >
      Normalize Cursor hook events (beforeShellExecution, beforeReadFile,
      beforeMCPExecution, beforeSubmitPrompt, stop) to internal schema.
      Format responses with permission/user_message/agent_message.

  - id: T11
    title: OpenCode vendor adapter
    priority: P2
    estimate: M
    description: >
      Normalize OpenCode hook events to internal schema. Map OpenCode-specific
      tool names and event names to quae's canonical format.

  - id: T12
    title: Factory AI vendor adapter
    priority: P2
    estimate: S
    description: >
      Normalize Factory AI hook events to internal schema.
      Factory uses same structure as Claude Code with minor differences.

  - id: T13
    title: Vendor auto-detection
    priority: P2
    estimate: S
    description: >
      Inspect input JSON payload structure to infer vendor when --harness
      flag is absent. Detection heuristics based on field names and structure.

  - id: T14
    title: Validation commands
    priority: P2
    estimate: M
    description: >
      quae validate-rules: validate CUE rules against schema.
      quae validate-adapter <vendor> [--fixture]: test adapter with fixtures.
      quae validate-parser <tool> [--fixture]: test parser with fixtures.

  - id: T15
    title: quae init scaffolding
    priority: P2
    estimate: S
    description: >
      CLI command to create .quae/ directory with example rules and config.
      Generate vendor-specific hook registration configs.

  # P3 — Extensibility
  - id: T16
    title: Wasm runtime integration
    priority: P3
    estimate: L
    description: >
      Integrate wazero as the Wasm runtime. Support fuel limits, memory limits,
      timeout, max output size. WASI capability gates (fs, net) defaulting to
      false. Module loading from ~/.config/quae/modules/ with sha256 verification
      against lockfile.

  - id: T17
    title: Signal execution engine
    priority: P3
    estimate: M
    description: >
      Compute needed_signals = union(meta.requires) across all loaded rules
      (global + project). Run only referenced Wasm signal modules (static
      demand-driven). Attach results at signals.<name> as #SignalResult
      (ok, data, err). Signal not referenced by any rule never runs.

  - id: T18
    title: Module lockfile system
    priority: P3
    estimate: M
    description: >
      quae.lock.cue manifest declaring all executable modules with #Module
      schema. SHA256 verification on load. Module resolution: lockfile →
      ~/.config/quae/modules/<n>.wasm. Support for module dependencies
      (deps field).

  - id: T19
    title: Additional parser backends
    priority: P3
    estimate: L
    description: >
      Regex parser backend (config-driven via parser.cue).
      Tree-sitter parser backend (embedded Wasm grammars via wazero).
      Wasm parser backend (lockfile-referenced modules).
      All backends emit canonical #Parsed at tool_input.parsed.
      jq backend deferred — gojq lacks fuel/memory sandboxing and is
      unacceptable on the security hot path until a wazero-hosted jq or
      equivalent sandboxed path exists.

  - id: T20
    title: validate-modules command
    priority: P3
    estimate: S
    description: >
      quae validate-modules: verify lockfile integrity and module hashes.
      Depends on module lockfile system (T18).

  # Integration tests — end-to-end CLI behavior across all harnesses
  - id: T21
    title: Scrut-based integration tests
    priority: P2
    estimate: M
    description: >
      End-to-end CLI integration tests using scrut (facebookincubator/scrut).
      A single markdown file (tests/policies.md) contains scrut code blocks that
      pipe JSON hook events into `quae eval` and snapshot the exact stdout JSON.
      A small clean-room set of policy files lives under tests/policies/ (CUE
      rules that are NOT installed globally — the tests pass --config to point
      at them). Cover the canonical scenarios: rm -rf / (system-path block),
      git commit --no-verify (policy deny), git add .env (secret file),
      destructive action via compound command (semicolon / && / |), safe
      commands that should allow, and at least one modify/inject effect.
      Also exercise each vendor harness (claude, cursor, opencode, factoryai)
      to verify each adapter renders the envelope correctly.
      Run via: `scrut test -w . tests/policies.md`. Wire into CI as a make
      target (`make test-integration`) and add to .github/workflows/ci.yml.
      Depends on: T7 (CLI), T6 (Claude Code adapter), T10-T12 (other vendor
      adapters) so all harnesses can be exercised.
