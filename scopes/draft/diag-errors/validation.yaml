---
scope: diag-errors
created: 2026-04-22
status: draft
---

taxonomy:
  scope:
    status: clear
    rationale: >
      Compiler-style diagnostics: types, codes, renderer, per-segment localize,
      CLI surface (--explain flag, env var, explain subcommand, --code help),
      scrut contract. Excluded: evaluator semantics (owned by
      subsume-evaluator), machine-readable output (follow-up), multi-file
      cross-refs, LSP/IDE integration, color output (v1).

  behavior:
    status: clear
    rationale: >
      Fast path unchanged (Subsume → bool). Debug path activates only on opt-in
      (flag/env/subcommand). Three localization species: path-segment (E0201),
      leaf constraint (E0301), disjunction all-fail (E0401). Existing load
      errors and lint rejections migrate to the same renderer — one visual
      language across the tool.

  data_model:
    status: clear
    rationale: >
      New types: Diagnostic, Label, Severity (internal/diag). Extended:
      config.Rule.WhenSyntax ast.Expr. New package: internal/diag with
      renderer + source cache + code registry. Evaluator grows Explain()
      alongside existing Evaluate().

  constraints:
    status: clear
    rationale: >
      Zero cost on production path (debug only runs on opt-in). Renderer
      output deterministic (snapshot-testable). No external rendering deps.
      Degraded rendering when positions unavailable (no crash).

  edge_cases:
    status: partial
    rationale: >
      Covered: missing positions → "position unknown" label; absent optional
      path → no diagnostic (rule matches); disjunction with arms that themselves
      disjoin. Open: closest-match arm ranking (v1), multi-line span rendering
      (rare), color output on tty (default on / --no-color), JSON output
      format for tooling.

  integration:
    status: clear
    rationale: >
      Touches: internal/diag (new), internal/config/loader.go (migration),
      internal/config/lint.go (emit diagnostics), internal/evaluator/
      (Explain + localize), cmd/quae/main.go (CLI wiring), tests/diagnostics.md
      (new). Does NOT touch: internal/adapter, internal/envelope,
      internal/parser, internal/pipeline, internal/synthesis, cue/schema.cue.

  terminology:
    status: clear
    rationale: >
      "Diagnostic" = structured error-as-value; rendered via diag.Render.
      "Label" = a (Pos, Len, Msg) triple; one primary + N notes per diagnostic.
      "Error code" = E01xx..E05xx stable identifier per failure class.
      "Localize" = walk rule AST + input to emit a precise Diagnostic on
      subsumption failure. "Debug path" = opt-in evaluator branch that
      produces diagnostics; zero cost when not enabled.

gates:
  - name: go_tests
    description: All Go tests pass after all T* complete.
    command: go test ./...
    must_pass: true

  - name: renderer_determinism
    description: >
      diag.Render output is byte-identical across runs for the same input.
      Snapshot tests in internal/diag/render_test.go enforce this.
    must_pass: true

  - name: scrut_policies
    description: tests/policies.md unchanged by this scope — must still pass.
    command: scrut test tests/policies.md
    must_pass: true

  - name: scrut_diagnostics
    description: New scrut contract tests/diagnostics.md passes.
    command: scrut test tests/diagnostics.md
    must_pass: true

  - name: ast_retained
    description: >
      config.Rule has non-nil WhenSyntax after load; positions resolve to
      correct source file + line.
    must_pass: true

  - name: production_zero_cost
    description: >
      Evaluator fast path (no --explain, no QUAE_EXPLAIN, no explain
      subcommand) performs exactly one Subsume call per rule. Benchmark
      baseline not regressed.
    must_pass: true

review_config:
  roles:
    - general
    - architecture
    - compliance
  harnesses:
    - claude
  opencode:
    enabled: true
  # UX-heavy work — second opinion on renderer format, help strings, and
  # error code taxonomy is worth it.

audit:
  - timestamp: 2026-04-22
    action: created
    actor: scope skill
    note: >
      Split from the superseded `when-sublanguage` scope. User requested
      separation of evaluator-correctness work (subsume-evaluator) from
      diagnostic UX work (this scope). Rust-compiler diagnostic shape
      settled in-conversation: per-segment provenance, error code
      taxonomy, shared renderer for load/lint/eval errors, zero-cost
      production path. Depends on subsume-evaluator landing first.
