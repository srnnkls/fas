---
scope: diag-errors
created: 2026-04-22
---

# Phase-based DAG. [P] = parallelizable within phase.
# External dep: subsume-evaluator scope must be complete before this scope starts
# (Subsume is the evaluation primitive this scope attaches diagnostics to).

phases:
  - name: foundation
    description: >
      Types, renderer, error codes. Independent work — can start as soon as
      subsume-evaluator lands. T1 and T2 parallelize (diff files, diff concerns).
    tasks:
      - id: T1
        parallel: true  # [P]
      - id: T2
        parallel: true  # [P]

  - name: ast-retention
    description: >
      Thread ast.Expr for when through the loader. Gates everything else that
      needs source positions.
    tasks:
      - id: T3
        parallel: false
        depends_on: [T1]

  - name: migration
    description: >
      Migrate existing errors (load + lint) to the new renderer. T4 and T5
      parallelize — they touch different error sources.
    tasks:
      - id: T4
        parallel: true  # [P]
        depends_on: [T1, T2]
      - id: T5
        parallel: true  # [P]
        depends_on: [T1, T2, T3]

  - name: debug-path
    description: >
      The evaluator's localize is the centerpiece. Depends on AST retention
      and the renderer.
    tasks:
      - id: T6
        parallel: false
        depends_on: [T1, T2, T3]

  - name: cli
    description: >
      CLI surface. T7 → T8 → T10 sequential on main.go; T9 parallel with T8
      (different subcommand).
    tasks:
      - id: T7
        parallel: false
        depends_on: [T6]
      - id: T8
        parallel: true  # [P]
        depends_on: [T7]
      - id: T9
        parallel: true  # [P]
        depends_on: [T6]
      - id: T10
        parallel: false
        depends_on: [T2, T9]

  - name: contract
    description: Scrut coverage for CLI surface.
    tasks:
      - id: T11
        parallel: false
        depends_on: [T7, T8, T9, T10]

# Execution order summary:
# 1. T1 ‖ T2 (parallel foundation)
# 2. T3 (after T1)
# 3. T4 ‖ T5 (parallel migration, after T1+T2+T3)
# 4. T6 (debug path, after T1+T2+T3)
# 5. T7 (after T6), then T8 ‖ T9 (parallel), then T10 (after T9)
# 6. T11 (final scrut, after all CLI tasks)

# External precondition:
# - subsume-evaluator scope must be complete. This scope reads Rule.When
#   (which that scope defines) and adds Rule.WhenSyntax alongside.
