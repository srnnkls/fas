    severity: low
    file: internal/config/loader.go
    description: decodeRule signature coupled to pre-Unify fieldVal; could be decoupled by extracting AST in extractFileRules and passing ast.Expr into decodeRule
  - batch: 2
    severity: low
    file: internal/config/whensyntax_test.go
    description: joinSegments wraps strings.Join in redundant fmt.Sprintf
  - batch: 2
    severity: low
    file: internal/config/whensyntax_test.go
    description: labelName manually strips quotes; strconv.Unquote is stdlib-idiomatic
  - batch: 2
    severity: low
    file: internal/config/whensyntax_test.go
    description: filename diverges from loader_*_test.go convention; consider loader_whensyntax_test.go
  - batch: 1
    severity: low
    file: internal/diag/render.go
    description: orderedLabels sorts degraded labels (lineNum=0) ahead of valid ones; not triggered by current tests
  - batch: 1
    severity: low
    file: internal/diag/render.go
    description: primary label resolved twice per Render call (writeLocation + orderedLabels)
  - batch: 1
    severity: low
    file: internal/diag/render.go
    description: nil SourceCache panics rather than degrading per NF3
  - batch: 1
    severity: low
    file: internal/diag/render.go
    description: writeLocation drops filename when ok=false
  - batch: 1
    severity: low
    file: internal/diag/source.go
    description: FileCache.load holds mutex across os.ReadFile (serializes I/O)
  - batch: 1
    severity: low
    file: internal/diag/render_test.go
    description: section divider comment at line 451
  - batch: 1
    severity: low
    file: internal/diag/render_test.go
