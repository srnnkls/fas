scope: cue-native-diagnostics
created: 2026-04-23
---

# Task DAG — grouped by parallelizable phase.
# Phase N tasks depend only on Phase <N tasks.
# Within a phase, tasks are independent and can be dispatched in parallel.

phases:
  - name: foundation
    description: Model changes and new code — everything else depends on these.
    tasks: [T1, T2]

  - name: localize-extract
    description: Extract Reasons from CUE inference; parallel per reason family.
    tasks: [T3, T4, T8]
    notes: >
      T3 (kind mismatch) and T8 (did-you-mean) are independent of T4.
      T4 (conjunct decomposition) unblocks T5, T6, T7.

  - name: localize-enrich
    description: Builds on T4's conjunct walk.
    tasks: [T5, T6, T7, T9]
    notes: >
      T5 (bound distance), T6 (regex diverge), T7 (arm ranking),
      T9 (provenance) all consume T4's decomposed Expr walk.

  - name: render-text
    description: Text renderer polish + per-Reason formatting.
    tasks: [T10, T11, T12]
    notes: >
      T10 (collapse) and T11 (no-restate) are independent.
      T12 (per-Reason) depends on T10.

  - name: render-formats
    description: Alternate output formats — all three parallel after T12.
    tasks: [T13, T14, T15]
    notes: >
      T13 (JSON), T14 (SARIF), and T15 (color) all consume the Reason tree
      directly and the per-Reason text dispatch from T12. No inter-task
      dependency inside this phase: SARIF emitter does NOT consume T13's
      JSON output — both are independent format-specific marshalers built
      against the same in-memory Reason tree. All three can dispatch in
      parallel.

  - name: cli
    description: Wire formats and color through the CLI surface.
    tasks: [T16]

  - name: test-goldens
    description: Update existing + add new scrut contracts.
    tasks: [T17, T18]
    notes: >
      T17 (rewrite existing goldens) depends on renderer changes landing.
      T18 (new format goldens) depends on T16 + T17.

edges:
  # Explicit dependency list — must match tasks.yaml depends_on.
  - { from: T1, to: [T3, T4, T7, T8, T9, T10, T11, T12, T13] }
  - { from: T2, to: [T3] }
  - { from: T3, to: [T4, T7] }
  - { from: T4, to: [T5, T6, T7, T9, T11] }
  - { from: T10, to: [T12, T17] }
  - { from: T11, to: [T17] }
  - { from: T12, to: [T13, T14, T15, T17] }
  - { from: T13, to: [T16] }
  - { from: T14, to: [T16] }
  - { from: T15, to: [T16] }
  - { from: T16, to: [T18] }
  - { from: T17, to: [T18] }
