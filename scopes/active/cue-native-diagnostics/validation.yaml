---
scope: cue-native-diagnostics
created: 2026-04-23
status: draft
---

taxonomy:
  scope:
    status: clear
    rationale: >
      Typed Reason model (KindMismatch / BoundViolation / RegexMismatch /
      ConjunctFailed / DisjunctionFailed / KeyMissing / Provenance) flows
      from evaluator (localize) through renderer (text / JSON / SARIF /
      color TTY). No new error codes — KindMismatch attaches to the
      already-allocated E0303 (type mismatch), BoundViolation to E0302
      (value out of range), RegexMismatch to E0301 (regex), KeyMissing to
      E0201, DisjunctionFailed to E0401. Excluded: LSP integration, @hint
      attributes, cross-file conflicts, evaluator semantics changes, i18n.

  behavior:
    status: clear
    rationale: >
      Fast path preserved: explainEnabled()=false → zero cost, no Reason
      construction. Renderer enforces "no restate" (drop labels duplicating
      title/carets; conditional want: via reference/divergence gate),
      collapses same-span labels into one frame with aligned messages.
      Disjunction primary becomes "closest arm was <X>" via 3-tier scoring
      heuristic (kind > structural > value distance). Absent-key diagnostics
      gain Levenshtein did-you-mean. Provenance entries (max 3) expose
      cross-file unification origins as footer notes.

  data_model:
    status: clear
    rationale: >
      Sealed interface `Reason` with 7 concrete variants (AD-1), split into
      two groups: singular failure reasons (6 variants — KindMismatch,
      BoundViolation, RegexMismatch, ConjunctFailed, DisjunctionFailed,
      KeyMissing) and metadata reason (1 variant — Provenance). Invariant
      I3a: each singular variant describes exactly one shape; multiplicity
      at a single yield point is expressed by the Label via
      `Reasons []Reason`, never by growing singular variants into
      collections or introducing wrapper variants. Variants hold ONLY
      JSON-serializable DTO fields; shared `Span{File,Line,Col,Length}`
      replaces any `ast.Expr`/`token.Pos` carried in-model. `Label` gains
      `Reasons []Reason`; length-0 falls through to `Msg` (NF5 migration
      buffer). No changes to `Diagnostic`, `Severity`, or source cache
      interface. No new code constants — E0301/E0302/E0303/E0304 already
      allocated in v0.

  constraints:
    status: clear
    rationale: >
      Zero cost on fast path (NF1). Deterministic output across text / JSON /
      SARIF (NF2). No panics; invalid positions degrade to v0 fallback (NF3).
      No new module deps — isatty via transitive x/term, SARIF hand-rolled
      (NF4). Full backwards compatibility: v0 diagnostics still render through
      the new renderer unchanged (NF5). No new code constants — taxonomy
      remains stable from v0.

  edge_cases:
    status: clear
    rationale: >
      Covered in gotchas: cue.Value.Expr() mixing syntactic/semantic operands;
      token.NoPos frequency for builtin kinds and unified stdlib values;
      regex DivergeAt unavailable for complex patterns (fallback to "did not
      match"); SARIF logicalLocations nesting; unicode byte-offset in regex
      divergence; Levenshtein on empty availableKeys list; Provenance
      deduplication across conjunct nesting.

  integration:
    status: clear
    rationale: >
      Touches: internal/diag (Reason type, renderer dispatch, JSON/SARIF/color
      formatters), internal/evaluator/localize.go (Expr walk, per-reason
      extraction, arm ranking, provenance), cmd/fas/main.go (--format,
      --color flags + env vars), tests/diagnostics.md (golden rewrites),
      tests/diagnostics_formats.md (new). Does NOT touch: adapter, envelope,
      parser, pipeline, synthesis, cue/schema.cue, the Subsume fast path
      itself, or the existing stable output of v0 diagnostics (see NF5).

  terminology:
    status: clear
    rationale: >
      "Reason" = typed payload attached to a Label, dispatched uniformly by
      the renderer. Two taxonomic groups: "failure reason" (6 singular
      variants, each describes one failure shape) and "metadata reason"
      (Provenance, decorates footer labels). "Variant" = one of the 7
      concrete Reason types. "Singular variant" = a Reason describing
      exactly one shape (I3a); ConjunctFailed, KindMismatch, etc. — never
      holds `[]Reason`. Multiplicity at a yield point is expressed via
      `Label.Reasons []Reason`, not by wrapping variants or growing
      variants into collections. "Span" = serializable position DTO
      `{File, Line, Col, Length}` that replaces `token.Pos`/`ast.Expr` in
      the in-memory model so JSON round-trips stably. "Arm" = one disjunct
      of an `A | B | C` expression. "ArmResult" = `{Arm, Span, Inner, Score}`
      produced by the ranking heuristic. "Provenance" = a cross-file origin
      span discovered by walking unified conjuncts. "Divergence offset" =
      first byte offset where input stopped matching a regex pattern.
      "No-restate" = the principle (feedback_diag_no_restate.md) that labels
      must not duplicate information from title or carets.

gates:
  - name: go_tests
    description: All Go tests pass after all T* complete.
    command: go test ./...
    must_pass: true

  - name: renderer_determinism
    description: >
      Byte-identical output across runs for text, JSON, and SARIF renderers
      given identical inputs. Snapshot tests enforce this.
    must_pass: true

  - name: fast_path_zero_cost
    description: >
      With explainEnabled=false, no Reason construction occurs (verified via
      allocation counter or explicit hook). Subsume call count per rule
      unchanged from v0.
    must_pass: true

  - name: backwards_compat
    description: >
      v0 diagnostics (Label with Msg but nil Reason) render identically to
      pre-scope output. Locked in via a snapshot of tests/policies.md output.
    must_pass: true

  - name: scrut_diagnostics
    description: tests/diagnostics.md passes with rewritten minimal goldens.
    command: scrut test tests/diagnostics.md
    must_pass: true

  - name: scrut_formats
    description: tests/diagnostics_formats.md (JSON/SARIF/color) passes.
    command: scrut test tests/diagnostics_formats.md
    must_pass: true

  - name: sarif_schema_valid
    description: >
      Emitted SARIF documents validate against SARIF 2.1.0 JSON schema
      (validator run as part of render_sarif_test.go).
    must_pass: true

  - name: no_new_codes
    description: >
      `internal/diag/codes.go` codes-list slice is unchanged in length
      after this scope (zero additions). `fas explain --code E0305`
      still exits 2 (no new code allocated). Existing codes E0301/E0302/
      E0303/E0304 continue to print non-empty, multi-line help.
    must_pass: true

  - name: scrut_policies_unchanged
    description: >
      tests/policies.md unchanged — this scope must not regress evaluator
      behavior or production-path output.
    command: scrut test tests/policies.md
    must_pass: true

review_config:
  roles:
    - general
    - architecture
    - compliance
  harnesses:
    - claude
  opencode:
    enabled: true
  # Heavy UX + API surface work — Reason sum type design, JSON/SARIF schemas,
  # and arm-ranking heuristic all benefit from a second opinion. SARIF schema
  # compliance specifically warrants architecture review.

audit:
  - timestamp: 2026-04-23
    action: created
    actor: scope skill
    note: >
      Follow-on to the shipped `diag-errors` scope (v0, flat Label.Msg model).
      Design phase converged on path (b) — extend the model with typed
      Reasons rather than improving hand-formatted strings. User answered
      "maximalist" on both gating questions: all existing codes get Reason
      payloads, and all four output formats ship in v1 (text, JSON, SARIF,
      color TTY). Guiding principle captured as feedback memory:
      diagnostics must not restate information already visible via title
      or carets.
  - timestamp: 2026-04-24
    action: reviewed
    actor: user
    note: >
      Six-item review pre-implementation. Fixed: (1) code-collision —
      dropped plan to allocate E0302 for KindMismatch; the v0 scope already
      allocated E0302 (bound violation) and E0303 (type mismatch). Reused
      existing E0303 for KindMismatch; no new codes in this scope.
      (2) JSON round-trip — removed `ast.Expr` and `token.Pos` from the
      Reason model; variants now hold only DTO fields (`Expr string`,
      `Span{File,Line,Col,Length}`). (3) AD-1 Provenance inconsistency —
      authoritative list now enumerates all 7 variants, split into
      failure-reason and metadata-reason groups. (4) DAG contradiction —
      dropped T13 → T14 edge; SARIF emitter consumes the Reason tree
      directly, not the JSON output. T13/T14/T15 now truly parallel.
      (5) KindMismatch output — canonical format is
      `expected <Want>, got <Got>: <Actual>`; added `Actual string` field
      to the variant. Acceptance criterion and example-5 aligned.
      (6) QUAE_NO_COLOR — dropped; the scope commits only to FAS_COLOR
      and NO_COLOR (community convention).
  - timestamp: 2026-04-24
    action: reviewed
    actor: user
    note: >
      Second-round review surfaced five behavioural underspecifications
      (plus one cross-cutting gap); five codified, one flagged as open:
      (Q1) RegexMismatch input echo — 60-char window centred on DivergeAt,
      ellipsis trim with caret offset compensation, added to F8 and to
      acceptance criteria. (Q3) DisjunctionFailed no-close-arm threshold —
      added `ScoreKindMatch` floor to AD-3 and F8; text renderer
      suppresses ranked caret frames when `Arms[0].Score <
      ScoreKindMatch`, flat summary + arms footer instead. JSON/SARIF
      still emit full ranked list (data-layer decision vs render-layer
      decision). (Q4) KeyMissing with empty parent — F5 now specifies
      vacuous Suggestion + "parent is an empty struct" footer replacement.
      (Q5) `want:` gate is AST-based, not text-based — F7 clarified:
      cheap gate checks `*ast.Ident`/`*ast.SelectorExpr`, stronger gate
      runs `formatted(ruleNext.Expr()) != formatted(f.Value)` on
      canonically-formatted CUE. (Q6) Multi-failure-per-rule — new F13
      codifies the inherited v0 policy: one diagnostic per yield point,
      siblings independent, structural failure blocks descent, no cap,
      deterministic source-walk order.
  - timestamp: 2026-04-24
    action: reviewed
    actor: user
    note: >
      Q2 round 1 — chose (c): add `Multi{Reasons []Reason}` wrapper
      variant to preserve sum-type purity while expressing multi-
      reason-at-one-point. Sum-type grew to 8 variants; renderers
      gained a Multi dispatch case.
  - timestamp: 2026-04-24
    action: reviewed
    actor: user
    note: >
      Q2 round 2 — reverted (c) for a cleaner design: `Label.Reasons
      []Reason` (slice on the attachment point) instead of a `Multi`
      wrapper variant. Rationale: multiplicity is a property of the
      attachment point, not of the Reason itself. Wrapping in a
      variant whose whole purpose is to hold a slice moves the slice
      somewhere less convenient while calling it a design pattern.
      The slice belongs on the Label, where it is semantically owned.
      Sum type drops back to 7 variants; singular-variant purity (I3a)
      is preserved without scaffolding; nested Reason positions
      (ConjunctFailed.Sub, ArmResult.Inner) are semantically singular
      in current scope and gain their own slice fields only if a
      future site requires it (additive). Renderers iterate
      `label.Reasons` — no `Multi` case in the type-switch. JSON
      schema flatter: `{... "reasons": [...]}`. Scope changes: AD-1
      back to 7 variants in 2 groups; I3a redefined as "multiplicity
      lives on Label"; F1/F3/F8 describe Label.Reasons slice
      behaviour; acceptance criteria reference slice length instead
      of Multi wrapper; T1 drops Multi, adds Label shape change and
      reflect-based guard that no variant holds `[]Reason`; T4 uses
      slice for multi-conjunct emission; T12 dispatch iterates
      `label.Reasons`; data_model/terminology in validation.yaml
      updated to match. Auditing both rounds preserves the design-
      decision trail.
