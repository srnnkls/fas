  - id: T12
    subject: Renderer — per-Reason text formatting
    description: >
      Add a `renderReasonText(r Reason) (msg string, carets int, caretOffset
      int)` dispatch function in `internal/diag/render.go`. Type-switch on
      each of the 7 variants:
        - KindMismatch → "expected <Want>, got <Got>: <Actual>"
        - BoundViolation → "<actual> violates <op> <bound> (<distance>)"
        - RegexMismatch → secondary input-echo snippet with carets under
          input[DivergeAt:], 60-char window centred on DivergeAt, `…` trim
          with offset compensation; footer "regex first diverged at offset N"
        - ConjunctFailed → underline failing conjunct; message from inner Sub
        - DisjunctionFailed → primary "closest arm was <arm>"; one note per
          arm ordered by rank; when Arms[0].Score < ScoreKindMatch, suppress
          ranked caret frames and render flat summary + arms footer
        - KeyMissing → footer "= hint: did you mean \"<Suggestion>\"?" when
          Suggestion non-empty; "parent at <path> is an empty struct" when
          AvailableKeys is empty
        - Provenance → footer "= note: constraint introduced at <file>:<line>:<col>"

      Label-level multi-reason handling (Label.Reasons slice):
        - len(Reasons)==0 → fall through to Msg (v0 path, NF5).
        - len(Reasons)==1 → dispatch single Reason as above.
        - len(Reasons)>=2 → first Reason's message goes on the caret row;
          subsequent Reasons render as aligned message rows stacked
          beneath the same caret (T10 same-span collapse applies
          identically to how multiple Note labels on the same span would
          collapse). JSON/SARIF emit `label.reasons` as an array.
    files:
      - internal/diag/render.go
      - internal/diag/render_reason_test.go
    status: completed
    depends_on: [T1, T10]
    test_hints:
      - Each of the 7 Reason variants has a dedicated renderer test with golden output.
      - Unknown Reason type (future variant) falls back to empty msg, no panic.
      - RegexMismatch DivergeAt=-1 falls back to "regex did not match".
      - Color codes absent when --color=never (via injected color fn).
      - Label with Reasons=[A, B] on the same span → source printed once, primary caret row carries A's message, aligned row beneath carries B's message.
      - Label with Reasons=[] → renderer falls through to Msg path (v0 compat).
      - Label with Reasons=[singleton] → same visual output as v0 single-reason Label would have produced.
      - DisjunctionFailed with Arms[0].Score < ScoreKindMatch → flat summary, no ranked carets.
      - KeyMissing with AvailableKeys=[] → "empty struct" footer, no hint line.

