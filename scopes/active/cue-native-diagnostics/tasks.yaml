  - id: T6
    subject: Localize — regex divergence detection
    description: >
      When a failing conjunct is a regex constraint (`=~"..."`), compute the
      longest-matching-prefix offset WITHOUT hand-rolling a regex matcher.
      Strategy:
        1. Parse pattern with `regexp/syntax.Parse(p, syntax.Perl)` → AST.
        2. If AST root is a concatenation, enumerate its atoms (literal
           runs, char classes, anchors, simple quantifiers).
        3. For each prefix `Pᵢ = concat(r₀..rᵢ)`, compile with Go's stdlib
           `regexp` and run `FindStringIndex` against the input.
        4. Largest i with a non-nil match wins; match's end byte offset
           becomes `DivergeAt`. Binary-search over i for efficiency.
      Go's regexp engine does all matching — we only use `syntax` for
      structural cut-point enumeration. Complex patterns (top-level `|`,
      nested quantified groups, lookarounds, non-concat roots) bail to
      `DivergeAt = -1`; renderer falls back to "regex did not match".
      No attempt to "almost" handle complex patterns.
    files:
      - internal/evaluator/localize.go
      - internal/evaluator/regex_diverge.go
      - internal/evaluator/regex_diverge_test.go
    status: completed
    depends_on: [T4]
    test_hints:
      - `=~"^rm "` vs `"ls"` → DivergeAt=0 (first char mismatch).
      - `=~"^rm "` vs `"rm-rf"` → DivergeAt=2 (space expected, got '-').
      - `=~"^[a-z]+$"` vs `"abc1"` → DivergeAt=3.
      - Pattern fails to parse syntax → DivergeAt=-1, graceful fallback.
      - Unicode input handled (offset is byte offset, documented).

