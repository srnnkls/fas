tasks:
  - id: T1
    subject: Define diag.Reason sum type + Span DTO + Label enrichment
    description: >
      Introduce sealed interface `Reason` in `internal/diag`. All variants
      hold ONLY serializable DTO fields — no `ast.Expr`, no `token.Pos` — so
      the tree round-trips through JSON byte-identically (NF2, T13).
      AST/position data is resolved at Reason construction time (inside
      `localize`) to DTO strings and Span structs.

      Shared DTO:
        Span{File string, Line, Col, Length int}

      Failure reasons (singular — each describes exactly one shape):
        KindMismatch{Want, Got cue.Kind, Actual string}
        BoundViolation{Op, Bound, Actual, Distance string}
        RegexMismatch{Pattern, Input string, DivergeAt int}
        ConjunctFailed{Expr string, Span Span, Sub Reason}
        DisjunctionFailed{Arms []ArmResult}
          where ArmResult{Arm string, Span Span, Inner Reason, Score int}
        KeyMissing{Key string, AvailableKeys []string, Suggestion string}

      Metadata reason (carried on footer labels):
        Provenance{Span Span, Snippet string}

      Invariant (I3a): each singular variant describes exactly one shape.
      Multiplicity at a single yield point lives on the Label via
      `Reasons []Reason`, not inside a wrapper variant and not via
      collection fields on singular variants. Preserves sum-type purity:
      `ConjunctFailed` always means one conjunct failed; two failing
      conjuncts at the same leaf = Label carrying two `ConjunctFailed`
      entries.

      Label shape change:
        Label{Pos, Len, Msg string, Reasons []Reason}
      len(Reasons)==0 → v0 Msg path (NF5). len(Reasons)>=1 → Reason
      dispatch; renderer iterates the slice.

      Sealing via unexported `reason()` method. Extend `Label` with optional
      `Reason Reason` field; `Msg` retained. Zero-value Reason is nil → v0
      behavior unchanged (NF5).
    files:
      - internal/diag/reason.go
      - internal/diag/span.go
      - internal/diag/diagnostic.go
      - internal/diag/reason_test.go
    status: completed
    test_hints:
      - Each of the 7 Reason variants implements the sealed interface (compile-time check).
      - Empty Reasons slice on a Label renders identically to v0 (Msg path).
      - Reason variants round-trip through JSON marshalling byte-identically across 12+ fixtures (incl. multi-reason Label cases).
      - No Reason field has type `ast.Expr` or `token.Pos` (reflect-based test guards the invariant).
      - No Reason variant has a field of type `[]Reason` (reflect-based test guards I3a — the slice lives on Label, not inside any variant).
      - ConjunctFailed.Sub can nest ConjunctFailed recursively without stack overflow (bounded depth).
      - Label with Reasons=[A, B, C] marshals to `"reasons": [...]` 3-element array; round-trips byte-identically.
      - Span zero-value (File="", all ints 0) marshals to a recognisable "unknown" shape.

