  - id: T4
    subject: Localize — conjunct decomposition via cue.Value.Expr()
    description: >
      Replace opaque `Subsume` discard at `localize.go:74` with a walk over
      `ruleNext.Expr()`. For each conjunct of `A & B & C`, check individually
      against `next`; collect failing conjuncts as singular `ConjunctFailed`
      reasons (with Expr string + Span DTO captured at construction, not
      ast.Expr).

      Multiplicity rule:
        - 1 failing conjunct → Label.Reasons = [ConjunctFailed{...}].
        - N failing conjuncts → Label.Reasons = [ConjunctFailed, ..., ConjunctFailed]
          preserving source-order. Never grow ConjunctFailed itself into a
          collection shape (I3a — the slice lives on Label, not in the
          variant).

      Primary diagnostic underlines the first failing conjunct's position.
      Code selection when Reasons contains mixed reason types: highest-
      priority code wins — kind mismatch > regex > bound > enum.
    files:
      - internal/evaluator/localize.go
      - internal/evaluator/localize_conjunct_test.go
    status: completed
    depends_on: [T1, T3]
    test_hints:
      - `count: int & >=5 & <=10` vs `count: 3` → Label.Reasons has length 1 (one ConjunctFailed), primary underlines `>=5`.
      - `count: int & >=5 & <=10 & !=7` vs `count: 7` → Label.Reasons has length 1, primary underlines `!=7`.
      - `x: string & =~"^[a-z]+$" & strings.MinRunes(5)` vs `x: "AB"` → Label.Reasons has length 2 [ConjunctFailed(regex), ConjunctFailed(min-runes)], source order preserved.
      - All conjuncts pass → no diagnostic yielded.
      - Nested `(A & B) & C` flattened cleanly into a single-level conjunct list before multiplicity check.
      - Mixed-Reasons (kind failure + bound failure at same leaf) → diagnostic code is E0303 (kind priority wins); Label.Reasons still carries both entries.

  - id: T5
