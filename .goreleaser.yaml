version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: fas
    main: ./cmd/fas
    binary: fas
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: fas
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  mode: replace
