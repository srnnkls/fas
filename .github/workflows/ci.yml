name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs on fast follow-up commits to the same branch / PR.
# Each ref gets its own concurrency group so main and feature branches do
# not interfere with each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  # Scrut integration tests are bash-driven (heredocs, /tmp paths) and only
  # supported on Linux/macOS by upstream. Pin to ubuntu-latest and run after
  # the build matrix so a cross-platform compile failure short-circuits.
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise run test-integration
