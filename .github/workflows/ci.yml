name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      # Windows tests are skipped pending a fix for the synthetic CUE
      # module root: `RulesModuleRoot = "/__fas_rules__"` is absolute on
      # POSIX but relative on Windows (no drive letter), and cue/load's
      # overlay rejects it. Tracked separately from CI.
      - if: matrix.os != 'windows-latest'
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...

  # Scrut integration tests are bash-driven (heredocs, /tmp paths) and only
  # supported on Linux/macOS by upstream. Pin to ubuntu-latest and run after
  # the build matrix so a cross-platform compile failure short-circuits.
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: go install ./cmd/fas
      - run: scrut test -w . tests/policies.md
      - run: scrut test -w . tests/diagnostics.md
      - run: scrut test -w . tests/diagnostics_formats.md
