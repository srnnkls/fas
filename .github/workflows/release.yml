name: release

on:
  push:
    tags: ["v*"]

permissions:
  # GoReleaser needs write access to publish the GitHub release.
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser reads the full tag history to compute the changelog
          # and previous-tag delta; a shallow checkout would mis-attribute
          # commits to the release.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
